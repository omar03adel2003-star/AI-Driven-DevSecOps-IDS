  # --- المرحلة الأولى: كل الفحوصات الأمنية (Security Checks) ---
  Security-Audit:
    name: "Run All Security Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y dos2unix
          pip install flake8 bandit pip-audit ansible

      - name: Force Fix Encoding (Anti-Windows Fix)
        # الخطوة دي بتمسح أي حروف غريبة أو تنسيق ويندوز بيبوظ الـ Ansible
        run: |
          find ansible -type f -exec dos2unix {} \;
          find ansible -type f -exec sed -i '1s/^\xEF\xBB\xBF//' {} \;

      - name: Python Lint & Security Scan
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r . -ll || true
          pip-audit || true

      - name: Ansible Syntax Check
        run: |
          cd ansible
          ansible-playbook site.yml --syntax-check

      - name: Gitleaks Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
