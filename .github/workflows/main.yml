name: "DevSecOps Pipeline: AI-IDS & GNS3 Automation"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- المرحلة الأولى: كل الفحوصات الأمنية (Security Checks) ---
  Security-Audit:
    name: "Run All Security Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install flake8 bandit pip-audit ansible

      - name: Python Lint & Security Scan
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r . -ll || true
          pip-audit || true

      - name: Ansible Syntax Check
        run: |
          cd ansible
          ansible-playbook site.yml --syntax-check

      - name: Gitleaks Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- المرحلة الثانية: التنبيه المباشر بنتيجة الفحص (Direct Notification) ---
  Slack-Direct-Notify:
    name: "Direct Slack Notification"
    needs: Security-Audit
    runs-on: ubuntu-latest
    if: always() # عشان يبعتلك سواء نجح أو فشل فوراً
    steps:
      - name: Notify Slack
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: 'Security-Bot'
          SLACK_TITLE: 'Audit Result: ${{ needs.Security-Audit.result }}'
          SLACK_MESSAGE: 'The Security Audit for Project "Abo 3mera" is finished. Result: ${{ needs.Security-Audit.result }} 🛡️'
          SLACK_COLOR: ${{ needs.Security-Audit.result == 'success' && 'good' || 'danger' }}

  # --- المرحلة الثالثة: التنفيذ (Deployment) ---
  Deploy-to-GNS3:
    name: "Deploy to GNS3 Environment"
    needs: Security-Audit # بيعتمد على نجاح الفحص
    runs-on: self-hosted 
    if: success() # مش هيبدأ غير لو الفحص اللي فوق "نجح" (أخضر)
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Ansible Playbook
        run: |
          cd ansible
          ansible-playbook -i inventory.ini site.yml --extra-vars "ansible_ssh_pass=${{ secrets.SARA_PASSWORD }}"
