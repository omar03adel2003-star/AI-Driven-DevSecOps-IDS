name: "Automated Daily Backup"

on:
  workflow_dispatch: 

jobs:
  backup:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backup
        run: tar -czvf project-backup.tar.gz ./ansible ./README.md

      - name: Copy backup to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: 22
          source: "project-backup.tar.gz"
          target: "/home/sara/backups/"
          overwrite: true
          timeout: 60s
          debug: true
